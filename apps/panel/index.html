<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCast</title>
    <link rel="stylesheet" href="css/styles.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="panel">

        <!-- Header -->
        <header class="header">
            <div class="logo-row">
                <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" />
                    <path d="M2 17l10 5 10-5" />
                    <path d="M2 12l10 5 10-5" />
                </svg>
                <div class="header-titles">
                    <h1 class="logo-text">AutoCast</h1>
                    <span class="version">v2.2</span>
                </div>
            </div>
        </header>

        <!-- Tab Navigation -->
        <nav id="tabNav" class="tab-nav" style="display: none;">
            <button type="button" class="tab-btn" data-tab="setup" id="tabSetup">
                <span class="tab-step">1</span>
                <span class="tab-label">Setup</span>
            </button>
            <span class="tab-connector"></span>
            <button type="button" class="tab-btn" data-tab="review" id="tabReview">
                <span class="tab-step">2</span>
                <span class="tab-label">Review</span>
            </button>
        </nav>

        <!-- Status Bar -->
        <div id="statusBar" class="status-bar status-idle">
            <span id="statusIcon" class="status-icon">&#9679;</span>
            <span id="statusText">Ready</span>
        </div>

        <!-- Main Content -->
        <div class="content-wrapper" id="mainContent">

            <!-- Tracks -->
            <section id="tracksSection" class="section">
                <div class="section-header">
                    <h2 class="section-title">Tracks</h2>
                    <button id="btnLoadTracks" class="btn btn-icon btn-secondary" title="Load Tracks">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>
                </div>
                <div id="trackList" class="track-list">
                    <div class="empty-state">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <p>No tracks loaded</p>
                    </div>
                </div>
            </section>

            <!-- Parameters -->
            <section id="paramsSection" class="section params-section">
                <h2 class="section-title">Settings</h2>
                <div class="param-card">
                    <div class="param-group">
                        <div class="param-header">
                            <label class="param-label">Sensitivity
                                <span class="tooltip"
                                    data-tip="Lower = detects quiet speech. Higher = strict (only loud speech). Increase if there is heavy bleed.">?</span>
                            </label>
                            <span class="param-value" id="valThreshold">0</span>
                        </div>
                        <input type="range" id="paramThreshold" class="slider" min="-8" max="8" value="0" step="1">
                        <div class="slider-labels"><span>More Sensitive</span><span>Stricter</span></div>
                    </div>
                    <div class="param-group">
                        <div class="param-header">
                            <label class="param-label">Min Peak (dBFS)
                                <span class="tooltip"
                                    data-tip="Final hard filter: segments with peak below this value are removed. Higher value = stricter cleanup of very quiet snippets.">?</span>
                            </label>
                            <span class="param-value" id="valMinPeak">-52 dB</span>
                        </div>
                        <input type="range" id="paramMinPeak" class="slider" min="-60" max="-45" value="-52" step="1">
                        <div class="slider-labels"><span>Keep more</span><span>Filter more</span></div>
                    </div>

                </div>
            </section>

            <!-- Analysis Progress -->
            <div id="progressContainer" class="progress-container" style="display: none;">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                </div>
                <span id="progressText" class="progress-text">0%</span>
            </div>
            <section id="cutPreviewSection" class="section cut-preview" style="display: none;">
                <div class="section-header">
                    <h2 class="section-title">Cut Preview</h2>
                    <div class="cut-preview-head-right">
                        <div id="cutPreviewMeta" class="cut-preview-meta"></div>
                        <div class="cut-preview-page-actions">
                            <button id="cutPreviewApplyBtn" class="btn btn-accent btn-sm" type="button">Apply Edits</button>
                        </div>
                    </div>
                </div>
                <div id="cutPreviewAnalysisMini" class="cut-preview-analysis-mini"></div>
                <div class="cut-preview-toolbar">
                    <div class="cut-preview-control-row cut-preview-zoom-row">
                        <label class="cut-preview-control-label" for="cutPreviewZoom">Zoom</label>
                        <input id="cutPreviewZoom" type="range" min="0" max="1000" step="1" value="0" class="slider cut-preview-zoom-slider">
                        <button id="cutPreviewFitBtn" class="btn btn-sm btn-secondary" type="button">Fit</button>
                        <span id="cutPreviewZoomLabel" class="cut-preview-zoom-label">100%</span>
                    </div>
                    <div class="cut-preview-control-row cut-preview-volume-row">
                        <label class="cut-preview-control-label" for="cutPreviewVolumeMaster">Preview</label>
                        <input id="cutPreviewVolumeMaster" type="range" min="0" max="300" step="1" value="100" class="slider cut-preview-volume-slider">
                        <span id="cutPreviewVolumeMasterLabel" class="cut-preview-zoom-label">100%</span>
                    </div>
                </div>
                <div class="cut-preview-layout">
                    <div class="cut-preview-main">
                        <div id="cutPreviewTimeline" class="cut-preview-timeline"></div>
                        <div id="cutPreviewNavigator" class="cut-preview-navigator"></div>
                    </div>
                    <aside class="cut-preview-side">
                        <div id="cutPreviewInspector" class="cut-preview-inspector"></div>
                    </aside>
                </div>
            </section>





        </div>

        <!-- Footer Actions -->
        <footer id="footerActions" class="footer-actions">
            <div class="action-row primary-actions">
                <button id="btnAnalyze" class="btn btn-primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polygon points="10 8 16 12 10 16 10 8"></polygon>
                    </svg>
                    Analyze
                </button>
                <button id="btnApply" class="btn btn-accent" disabled title="Generate cuts on timeline">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Apply Edits
                </button>
            </div>
            <div class="action-row secondary-actions">
                <button id="btnReset" class="btn btn-danger btn-sm" disabled>Reset</button>
                <div class="footer-meta">
                    <span id="modeIndicator" class="mode-badge">Cut-only</span>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/CSInterface.js?v=2"></script>
    <script src="js/mock_csi.js?v=2"></script>
    <script src="src/core/contracts/panel_contracts.js?v=1"></script>
    <script src="src/shared/html_utils.js?v=1"></script>
    <script src="src/shared/math_format_utils.js?v=1"></script>
    <script src="js/csi_bridge.js?v=3"></script>
    <script src="js/analyzer_client.js?v=5"></script>
    <script src="js/cut_preview_apply.js?v=2"></script>
    <script src="src/adapters/host/csi_bridge_adapter.js?v=1"></script>
    <script src="src/adapters/analyzer/analyzer_client_adapter.js?v=1"></script>
    <script src="src/adapters/storage/panel_storage_adapter.js?v=1"></script>
    <script src="src/app/panel_controller.js?v=1"></script>
    <script src="src/app/panel_bootstrap.js?v=1"></script>
    <script src="src/app/panel_init_feature.js?v=1"></script>
    <script src="src/app/panel_ui_runtime_feature.js?v=2"></script>
    <script src="src/app/panel_flow_runtime_feature.js?v=1"></script>
    <script src="src/app/panel_state_runtime_feature.js?v=1"></script>
    <script src="src/app/panel_preview_runtime_feature.js?v=1"></script>
    <script src="src/features/settings/components/settings_form_component.js?v=1"></script>
    <script src="src/app/panel_params_feature.js?v=1"></script>
    <script src="src/features/tracks/components/track_list_component.js?v=1"></script>
    <script src="src/features/tracks/services/tracks_feature.js?v=1"></script>
    <script src="src/features/tracks/services/tracks_loader_feature.js?v=1"></script>
    <script src="src/features/analysis/components/analysis_status_component.js?v=1"></script>
    <script src="src/features/analysis/services/analysis_feature.js?v=1"></script>
    <script src="src/features/analysis/services/analysis_run_feature.js?v=1"></script>
    <script src="src/features/analysis/state/analysis_store.js?v=1"></script>
    <script src="src/features/tracks/state/tracks_store.js?v=1"></script>
    <script src="src/features/cut-preview/services/cut_preview_state_feature.js?v=1"></script>
    <script src="src/features/cut-preview/state/cut_preview_store.js?v=1"></script>
    <script src="src/features/cut-preview/services/cut_preview_source_mapper_feature.js?v=1"></script>
    <script src="src/features/cut-preview/services/cut_preview_viewport_feature.js?v=1"></script>
    <script src="src/features/cut-preview/services/cut_preview_runtime_feature.js?v=1"></script>
    <script src="src/features/cut-preview/services/cut_preview_interaction_feature.js?v=1"></script>
    <script src="src/features/cut-preview/components/cut_preview_timeline_component.js?v=1"></script>
    <script src="src/features/cut-preview/components/cut_preview_navigator_component.js?v=1"></script>
    <script src="src/features/cut-preview/components/cut_preview_inspector_component.js?v=1"></script>
    <script src="src/features/cut-preview/services/cut_preview_render_feature.js?v=2"></script>
    <script src="src/features/audio-preview/services/audio_preview_feature.js?v=1"></script>
    <script src="src/features/audio-preview/state/audio_preview_store.js?v=1"></script>
    <script src="src/features/audio-preview/services/audio_preview_player_feature.js?v=1"></script>
    <script src="src/features/apply-edits/services/apply_edits_feature.js?v=1"></script>
    <script src="src/features/apply-edits/services/apply_edits_runner_feature.js?v=1"></script>
    <script src="src/features/settings/state/settings_store.js?v=1"></script>
    <script src="src/features/settings/services/settings_feature.js?v=1"></script>
    <script src="js/main.js?v=12"></script>
</body>

</html>
